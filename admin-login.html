<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Shaadi Hall</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #1A0A0A 0%, #3D1A1A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: #fff; border-radius: 24px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--crimson), var(--gold)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 12px; }
    .login-title { font-family: var(--font-display); font-size: 1.8rem; color: var(--crimson); }
    .login-subtitle { font-size: 0.88rem; color: var(--text-muted); margin-top: 4px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-input { width: 100%; padding: 12px 16px; border: 2px solid var(--cream-dk); border-radius: 10px; font-size: 0.95rem; background: var(--cream); transition: var(--transition); margin-bottom: 16px; }
    .form-input:focus { outline: none; border-color: var(--crimson); background: white; box-shadow: 0 0 0 4px rgba(139,26,26,0.08); }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--crimson), var(--crimson-lt)); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); margin-top: 8px; font-family: var(--font-body); }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,26,26,0.35); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .back-link { display: block; text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .back-link a { color: var(--crimson); font-weight: 600; }
    .admin-badge { background: linear-gradient(135deg, rgba(139,26,26,0.08), rgba(200,150,12,0.08)); border: 1px solid rgba(139,26,26,0.15); border-radius: 10px; padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; font-size: 0.83rem; color: var(--text-muted); }
    .password-wrap { position: relative; }
    .toggle-pwd { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1rem; color: var(--text-muted); background: none; border: none; padding: 0; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="icon">🔐</div>
    <div class="login-title">Admin Portal</div>
    <div class="login-subtitle">ShaadiHall — Restricted Access</div>
  </div>

  <div class="admin-badge">
    🛡️ This area is restricted to authorised administrators only.
  </div>

  <form onsubmit="adminLogin(event)">
    <label class="form-label">Email Address</label>
    <input type="email" class="form-input" id="admin-email" placeholder="admin@shaadihall.in" required autocomplete="email">

    <label class="form-label">Password</label>
    <div class="password-wrap">
      <input type="password" class="form-input" id="admin-password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px">
      <button type="button" class="toggle-pwd" onclick="togglePwd('admin-password',this)">👁️</button>
    </div>

    <button type="submit" class="login-btn">Sign In to Admin Panel →</button>
  </form>

  <div class="back-link">
    <a href="index.html">← Back to Website</a>
    &nbsp;·&nbsp;
    <a href="vendor-login.html">Vendor Login</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/admin.js"></script>
<script>
  function togglePwd(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === "password" ? "text" : "password";
    btn.textContent = inp.type === "password" ? "👁️" : "🙈";
  }
  // Redirect if already logged in as admin
  document.addEventListener("DOMContentLoaded", () => {
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      const role = await AuthModule.getUserRole(user.uid);
      if (role === "admin") window.location.href = "admin-dashboard.html";
    });
  });
</script>
</body>
</html>
