<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Vendor Panel</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/vendor.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="vendor-body admin-body" style="background:#F5F4F1">
<div class="vendor-layout">

  <aside class="vendor-sidebar" id="vendor-sidebar">
    <div class="sidebar-logo" style="padding:20px 18px;border-bottom:1px solid rgba(200,150,12,0.2);display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:linear-gradient(135deg,#8B1A1A,#C8960C);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:white">🎭</div>
      <div>
        <div style="font-family:'Playfair Display',serif;color:white;font-size:1rem;font-weight:700">Vendor Panel</div>
        <div style="font-size:0.68rem;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em">ShaadiHall</div>
      </div>
    </div>
    <nav style="padding:16px 0;flex:1">
      <a href="vendor-dashboard.html" class="sidebar-link"><span class="link-icon">📊</span> Dashboard</a>
      <a href="vendor-profile.html"   class="sidebar-link active"><span class="link-icon">👤</span> My Profile</a>
      <a href="vendor-bookings.html"  class="sidebar-link"><span class="link-icon">📋</span> Enquiries / Leads</a>
      <a href="index.html" class="sidebar-link" target="_blank" style="margin-top:8px"><span class="link-icon">🌐</span> View Website</a>
      <a href="#" class="sidebar-link" onclick="AuthModule.logout()"><span class="link-icon">🚪</span> Logout</a>
    </nav>
    <div style="padding:16px 18px;border-top:1px solid rgba(255,255,255,0.08);font-size:0.75rem;color:rgba(255,255,255,0.35)">
      <span id="vendor-name" style="color:#E8B422">…</span>
    </div>
  </aside>

  <main class="vendor-main">
    <div class="vendor-topbar">
      <div class="topbar-title" style="font-family:'Playfair Display',serif;font-size:1.1rem">👤 Edit My Profile</div>
      <button class="btn-admin btn-admin-primary" onclick="saveVendorProfile()">💾 Save Changes</button>
    </div>

    <div class="vendor-content">
      <div style="display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start">

        <!-- Left: photo + status -->
        <div>
          <div class="table-card" style="text-align:center;padding:28px">
            <img id="vp-photo-preview" src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=200" alt="Profile" class="vendor-profile-img" style="margin:0 auto 16px">
            <div id="vp-name-display" style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px">Loading…</div>
            <div id="vp-cat-display" style="font-size:0.78rem;color:#C8960C;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px"></div>
            <span class="status-badge" id="vp-status">…</span>
            <hr style="border:1px solid #E8DDD0;margin:16px 0">
            <div class="form-group">
              <label class="form-label" style="font-size:0.75rem;font-weight:600;color:#7A5A5A;text-transform:uppercase;letter-spacing:0.05em">Profile Image URL</label>
              <input type="url" class="form-control" id="vp-image" placeholder="https://…" oninput="previewPhoto(this.value)">
            </div>
          </div>
        </div>

        <!-- Right: profile form -->
        <div class="table-card" style="padding:28px">
          <form id="vendor-profile-form" class="admin-form">
            <input type="hidden" id="vp-doc-id">

            <div class="form-row">
              <div class="form-group">
                <label>Business / Vendor Name *</label>
                <input type="text" class="form-control" id="vp-name" required>
              </div>
              <div class="form-group">
                <label>Category</label>
                <select class="form-control" id="vp-category">
                  <option value="catering">Catering</option>
                  <option value="decoration">Decoration</option>
                  <option value="photography">Photography</option>
                  <option value="makeup">Makeup</option>
                  <option value="mehendi">Mehendi</option>
                  <option value="dj">DJ & Sound</option>
                  <option value="flower">Flower Decoration</option>
                  <option value="events">Event Planner</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Phone *</label>
                <input type="tel" class="form-control" id="vp-phone">
              </div>
              <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="vp-email">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>City</label>
                <select class="form-control" id="vp-city">
                  <option value="Vijayapura">Vijayapura</option>
                  <option value="Bagalkot">Bagalkot</option>
                  <option value="Bidar">Bidar</option>
                  <option value="Dharwad">Dharwad</option>
                </select>
              </div>
              <div class="form-group">
                <label>Service Areas (comma-separated)</label>
                <input type="text" class="form-control" id="vp-areas" placeholder="Vijayapura, Bagalkot">
              </div>
            </div>
            <div class="form-group">
              <label>About Your Business</label>
              <textarea class="form-control" id="vp-description" rows="4" placeholder="Describe your services, experience and specialisations…"></textarea>
            </div>

            <!-- Packages -->
            <div style="margin-top:8px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <label style="font-size:0.82rem;font-weight:600;color:#7A5A5A;text-transform:uppercase;letter-spacing:0.05em">Service Packages</label>
                <button type="button" class="btn-admin btn-admin-secondary btn-admin-sm" onclick="addPackageRow()">➕ Add Package</button>
              </div>
              <div id="packages-container">
                <!-- Package rows injected here -->
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/vendor.js"></script>
<script>
  let currentVendorDocId = null;

  document.addEventListener("DOMContentLoaded", async () => {
    const { user } = await AuthModule.requireRole("vendor","vendor-login.html");
    const userData = await AuthModule.getCurrentUserData();
    if (userData) document.getElementById("vendor-name").textContent = userData.name;

    const snap = await db.collection("vendors").where("uid","==",user.uid).limit(1).get();
    if (!snap.empty) {
      currentVendorDocId = snap.docs[0].id;
      const v = snap.docs[0].data();
      document.getElementById("vp-doc-id").value       = currentVendorDocId;
      document.getElementById("vp-name").value         = v.name || "";
      document.getElementById("vp-category").value     = v.category || "catering";
      document.getElementById("vp-phone").value        = v.phone || "";
      document.getElementById("vp-email").value        = v.email || "";
      document.getElementById("vp-city").value         = v.city || "Vijayapura";
      document.getElementById("vp-areas").value        = (v.serviceAreas||[]).join(", ");
      document.getElementById("vp-description").value  = v.description || "";
      document.getElementById("vp-image").value        = v.profileImage || "";
      document.getElementById("vp-name-display").textContent = v.name;
      document.getElementById("vp-cat-display").textContent  = v.category?.toUpperCase() || "";
      document.getElementById("vp-status").textContent       = v.isApproved ? "✅ Approved" : "⏳ Pending";
      document.getElementById("vp-status").className         = `status-badge ${v.isApproved ? "status-active" : "status-pending"}`;
      if (v.profileImage) document.getElementById("vp-photo-preview").src = v.profileImage;
      (v.packages || []).forEach(p => addPackageRow(p));
    }
    hideLoading();
  });

  function previewPhoto(url) {
    if (url) document.getElementById("vp-photo-preview").src = url;
  }

  let pkgCount = 0;
  function addPackageRow(pkg = {}) {
    pkgCount++;
    const id = `pkg-${pkgCount}`;
    const html = `
      <div id="${id}" style="display:grid;grid-template-columns:1fr 100px 2fr auto;gap:10px;margin-bottom:10px;align-items:center">
        <input type="text" class="form-control" placeholder="Package name" value="${pkg.name||''}" style="font-size:0.88rem;padding:8px 12px">
        <input type="number" class="form-control" placeholder="₹ Price" value="${pkg.price||''}" style="font-size:0.88rem;padding:8px 12px">
        <input type="text" class="form-control" placeholder="What's included…" value="${pkg.details||''}" style="font-size:0.88rem;padding:8px 12px">
        <button type="button" onclick="document.getElementById('${id}').remove()" style="background:rgba(252,129,129,0.15);border:none;border-radius:8px;padding:8px 10px;cursor:pointer;color:#9b2c2c;font-size:1rem">🗑️</button>
      </div>`;
    document.getElementById("packages-container").insertAdjacentHTML("beforeend", html);
  }

  async function saveVendorProfile() {
    if (!currentVendorDocId) { showToast("Vendor profile not found","error"); return; }
    const pkgRows = document.querySelectorAll("#packages-container > div");
    const packages = [];
    pkgRows.forEach(row => {
      const inputs = row.querySelectorAll("input");
      if (inputs[0].value.trim()) packages.push({ name: inputs[0].value.trim(), price: parseFloat(inputs[1].value)||0, details: inputs[2].value.trim() });
    });
    const data = {
      name:         document.getElementById("vp-name").value.trim(),
      category:     document.getElementById("vp-category").value,
      phone:        document.getElementById("vp-phone").value.trim(),
      email:        document.getElementById("vp-email").value.trim(),
      city:         document.getElementById("vp-city").value,
      serviceAreas: document.getElementById("vp-areas").value.split(",").map(s=>s.trim()).filter(Boolean),
      description:  document.getElementById("vp-description").value.trim(),
      profileImage: document.getElementById("vp-image").value.trim(),
      packages,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    try {
      await db.collection("vendors").doc(currentVendorDocId).update(data);
      showToast("Profile saved successfully ✅");
      document.getElementById("vp-name-display").textContent = data.name;
      document.getElementById("vp-cat-display").textContent  = data.category.toUpperCase();
    } catch(err) { showToast("Error: " + err.message, "error"); }
  }
</script>
</body>
</html>
